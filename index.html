<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths GCSE Foundation Diagnostic Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --gold-gradient: linear-gradient(135deg, #f1c40f 0%, #d4af37 100%);
            --green-gradient: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            --accent-gradient: linear-gradient(135deg, #2ecc71 0%, #f1c40f 100%);
            --text-color: #ffffff;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; line-height: 1.1; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 1px; }

        .btn-main {
            display: block; width: 100%; padding: 18px; margin: 15px 0;
            border: none; border-radius: 15px;
            background: var(--accent-gradient);
            color: #000; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-main:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }

        .btn-option {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: white; padding: 16px; margin: 10px 0; width: 100%;
            border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .btn-option.correct { background: var(--green-gradient) !important; border: none; color: black; font-weight: bold; }
        .btn-option.wrong { background: var(--wrong-color) !important; border: none; }

        /* Timer Bar */
        #timer-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            margin-top: 20px; border-radius: 2px; overflow: hidden; display: none;
        }
        #timer-fill { height: 100%; background: var(--gold-gradient); width: 100%; }

        /* Achievements Pop-up */
        #achievement-popup {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%) scale(0.5);
            background: var(--gold-gradient); color: black; padding: 20px 40px;
            border-radius: 50px; font-weight: 900; z-index: 100;
            opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
        }
        #achievement-popup.show { opacity: 1; transform: translateX(-50%) scale(1); }

        /* Badges Grid */
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .badge-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; font-size: 0.8rem; filter: grayscale(1); opacity: 0.5;
        }
        .badge-item.unlocked { filter: grayscale(0); opacity: 1; border: 1px solid #f1c40f; background: rgba(241, 196, 15, 0.05); }
        .badge-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        .hidden { display: none; }
        .streak-fire { color: #f1c40f; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="achievement-popup">STREAK MASTER!</div>

<div id="app-container">
    <div id="screen-home" class="glass-card">
        <h1>MATHS GCSE</h1>
        <div class="subtitle">FOUNDATION DIAGNOSTIC</div>
        <button class="btn-main" onclick="startSession('diagnostic')">Start Diagnostic</button>
        <button class="btn-main" onclick="showPracticeMenu()" style="background: var(--glass-bg); color: white; border: 1px solid var(--glass-border);">Practice Topics</button>
        <button class="btn-main" onclick="showData()" style="background: transparent; color: #888; font-size: 0.8rem;">View Achievements</button>
    </div>

    <div id="screen-quiz" class="glass-card hidden">
        <div id="q-topic" style="color: #2ecc71; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;">Topic</div>
        <h2 id="q-text" style="margin: 20px 0; min-height: 80px;">Question...</h2>
        <div id="options-container"></div>
        <div id="timer-container"><div id="timer-fill"></div></div>
        <div class="streak-fire">🔥 Streak: <span id="streak-val">0</span></div>
    </div>

    <div id="screen-data" class="glass-card hidden">
        <h2>Mastery Badges</h2>
        <div class="badge-grid" id="badge-container">
            </div>
        <button class="btn-main" onclick="goHome()" style="margin-top: 30px;">Main Menu</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let sessionPool = [];
    let currentIdx = 0;
    let streak = 0;
    
    const badgeNames = {
        'Number': 'Number Ninja',
        'Algebra': 'Algebra Architect',
        'Ratio': 'Ratio Rockstar',
        'Geometry': 'Geometry Giant',
        'Probability': 'Probability Pro',
        'Statistics': 'Data Detective'
    };

    let userData = JSON.parse(localStorage.getItem('mathsAppData')) || {
        mastery: {}, // {questionID: correctCount}
        practiceList: [], 
        achievements: { s5: 0, s10: 0, s15: 0, s20: 0 }
    };

    // Audio Context for "Haptics"
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    Papa.parse("questions.csv", {
        download: true, header: true,
        complete: function(results) { allQuestions = results.data.filter(q => q.Active === "Yes"); }
    });

    function startSession(type, topic = null) {
        if (type === 'diagnostic') {
            sessionPool = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 20);
        } else {
            sessionPool = allQuestions.filter(q => q.Topic === topic).sort(() => 0.5 - Math.random()).slice(0, 10);
        }
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= sessionPool.length) { finishSession(); return; }
        
        const q = sessionPool[currentIdx];
        document.getElementById('q-topic').innerText = q.Topic;
        document.getElementById('q-text').innerText = q.Question;
        document.getElementById('timer-container').style.display = 'none';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        ['Option A', 'Option B', 'Option C', 'Option D'].forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = q[opt];
            btn.onclick = () => handleAnswer(index, q, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(choiceIdx, qData, btnElement) {
        const correctIdx = parseInt(qData['Correct Index']);
        const buttons = document.querySelectorAll('.btn-option');
        buttons.forEach(b => b.disabled = true);

        if (choiceIdx === correctIdx) {
            btnElement.classList.add('correct');
            playTone(600, 'sine', 0.2); // Success "ding"
            streak++;
            checkStreakMilestones();
            userData.mastery[qData.ID] = (userData.mastery[qData.ID] || 0) + 1;
        } else {
            btnElement.classList.add('wrong');
            buttons[correctIdx].classList.add('correct');
            playTone(150, 'triangle', 0.3); // Error "thud"
            streak = 0;
            if (!userData.practiceList.includes(qData.ID)) userData.practiceList.push(qData.ID);
        }

        document.getElementById('streak-val').innerText = streak;
        localStorage.setItem('mathsAppData', JSON.stringify(userData));

        // Start 3-second transition timer
        const timerContainer = document.getElementById('timer-container');
        const timerFill = document.getElementById('timer-fill');
        timerContainer.style.display = 'block';
        timerFill.style.transition = 'none';
        timerFill.style.width = '100%';
        
        setTimeout(() => {
            timerFill.style.transition = 'width 3s linear';
            timerFill.style.width = '0%';
        }, 50);

        setTimeout(() => {
            currentIdx++;
            showQuestion();
        }, 3050);
    }

    function checkStreakMilestones() {
        if ([5, 10, 15, 20].includes(streak)) {
            const pop = document.getElementById('achievement-popup');
            pop.innerText = `${streak} IN A ROW!`;
            pop.classList.add('show');
            playTone(800, 'square', 0.1); 
            setTimeout(() => pop.classList.remove('show'), 2000);
            
            if (streak === 5) userData.achievements.s5++;
            if (streak === 10) userData.achievements.s10++;
            // etc...
        }
    }

    function showPracticeMenu() {
        const practiceQs = allQuestions.filter(q => userData.practiceList.includes(q.ID));
        const topics = [...new Set(practiceQs.map(q => q.Topic))];
        if (topics.length === 0) return alert("Complete a Diagnostic first!");
        
        let choice = prompt("Enter topic to practice: " + topics.join(", "));
        if (topics.includes(choice)) startSession('practice', choice);
    }

    function showData() {
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-data').classList.remove('hidden');
        const container = document.getElementById('badge-container');
        container.innerHTML = '';

        // Calculate mastery per topic
        const topics = [...new Set(allQuestions.map(q => q.Topic))];
        topics.forEach(t => {
            const topicQs = allQuestions.filter(q => q.Topic === t);
            const masteredInTopic = topicQs.filter(q => (userData.mastery[q.ID] || 0) >= 3).length;
            const isUnlocked = masteredInTopic >= 5; // Unlock badge if 5 questions mastered in topic

            const div = document.createElement('div');
            div.className = `badge-item ${isUnlocked ? 'unlocked' : ''}`;
            div.innerHTML = `
                <span class="badge-icon">${isUnlocked ? '🏆' : '🔒'}</span>
                <strong>${badgeNames[t] || t}</strong><br>
                ${masteredInTopic} Mastered
            `;
            container.appendChild(div);
        });
    }

    function goHome() {
        document.querySelectorAll('.glass-card').forEach(s => s.classList.add('hidden'));
        document.getElementById('screen-home').classList.remove('hidden');
    }

    function finishSession() {
        alert("Session Complete! Total Mastery growing...");
        currentIdx = 0;
        goHome();
    }
</script>
</body>
</html>
